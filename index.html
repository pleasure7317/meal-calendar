<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eojin.today</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260610h">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/twemoji@14.0.2/dist/twemoji.min.js"></script>
</head>
<body>
    <!-- 입사 D-day -->
    <div class="dday-bar" id="ddayBar">
        <span class="dday-text" id="ddayText"></span>
    </div>

    <!-- 오늘의 영어 구문 (호텔리어 표현) -->
    <div class="english-section">
        <div class="english-card">
            <button class="english-scrap" id="scrapBtn" title="표현 노트에 스크랩">📌</button>
            <div class="english-main">
                <div class="english-label">🏨 오늘의 영어 구문 <span class="english-cat" id="englishCat"></span></div>
                <p class="english-en" id="englishEn"></p>
                <p class="english-ko" id="englishKo"></p>
            </div>
            <div class="english-btns">
                <button class="english-note-btn speak" id="englishSpeak">
                    <span class="note-icon">🔊</span>
                    <span class="note-label">발음 듣기</span>
                </button>
                <button class="english-note-btn study-more" id="studyMoreBtn">
                    <span class="note-icon">🎲</span>
                    <span class="note-label">다른 표현</span>
                </button>
                <button class="english-note-btn" id="openEnglishNote">
                    <span class="note-icon">🔖</span>
                    <span class="note-label">스크랩북</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Weather -->
    <div class="weather-section" id="weatherSection">
        <div class="weather-container">
            <div class="weather-head">
                <h2 class="weather-title">🌤️ 오늘의 홍천 날씨</h2>
                <span class="weather-now" id="weatherNow"></span>
            </div>
            <div class="weather-hours" id="weatherHours">
                <p class="weather-loading">날씨를 불러오는 중...</p>
            </div>
        </div>
    </div>

    <!-- 우리의 추억 갤러리 -->
    <div class="gallery-section">
        <div class="gallery-container">
            <div class="gallery-head">
                <h2 class="gallery-title">💕 어진이</h2>
                <button class="gallery-upload-btn icon-only" id="galleryUpload" title="사진 추가">+</button>
                <input type="file" id="galleryInput" accept="image/*" multiple hidden>
            </div>
            <div class="gallery-grid" id="galleryGrid">
                <p class="gallery-empty" id="galleryEmpty">아직 사진이 없어요.<br>오른쪽 위 🖼️ 로 추가할 수 있어요.</p>
            </div>
        </div>
    </div>

    <!-- 사진 올리기/편집 (날짜·위치 입력) -->
    <div class="modal-overlay" id="photoUploadOverlay">
        <div class="modal photo-upload-modal">
            <button class="modal-close" id="photoUploadClose">✕</button>
            <h3 class="register-title" id="puTitle">🖼️ 추억 올리기</h3>
            <div class="pu-preview" id="puPreview"></div>
            <button class="pu-change-btn" id="puChangePhoto" style="display:none;">🔄 사진 바꾸기</button>
            <input type="file" id="puReplaceInput" accept="image/*" hidden>
            <div class="register-step">
                <label class="register-label">📅 날짜</label>
                <input type="date" id="puDate" class="period-input">
            </div>
            <div class="register-step">
                <label class="register-label">위치</label>
                <input type="text" id="puLocation" class="pu-loc-input" placeholder="예: 홍천 카페, 우리집 …" maxlength="40">
            </div>
            <div class="register-step">
                <label class="register-label">📝 내용</label>
                <textarea id="puMemo" class="pu-memo-input" placeholder="그날의 이야기를 남겨보세요" maxlength="200" rows="2"></textarea>
            </div>
            <div class="pu-actions">
                <button class="btn-primary" id="puSubmit">올리기</button>
            </div>
        </div>
    </div>

    <!-- 사진 길게 누르면 뜨는 메뉴 -->
    <div class="modal-overlay" id="photoActionOverlay">
        <div class="modal photo-action-modal">
            <button class="pa-btn edit" id="paEdit">✏️ 편집하기</button>
            <button class="pa-btn del" id="paDelete">🗑️ 삭제하기</button>
            <button class="pa-btn cancel" id="paCancel">취소</button>
        </div>
    </div>

    <!-- 사진 크게 보기 -->
    <div class="photo-view-overlay" id="photoViewOverlay">
        <button class="photo-view-close" id="photoViewClose">✕</button>
        <img id="photoViewImg" src="" alt="추억 사진">
        <div class="pv-meta" id="photoViewMeta"></div>
    </div>

    <!-- Register Modal (Popup) -->
    <div class="modal-overlay" id="registerOverlay">
        <div class="modal register-modal">
            <button class="modal-close" id="registerClose">✕</button>
            <h3 class="register-title">📸 식단표 등록</h3>
            <p class="register-desc">기간을 선택하고 식단표 사진을 올려주세요</p>

            <!-- Step 1: Period Selection -->
            <div class="register-step">
                <label class="register-label">기간을 선택하세요</label>
                <div class="period-selector">
                    <input type="date" id="periodStart" class="period-input">
                    <span class="period-arrow">~</span>
                    <input type="date" id="periodEnd" class="period-input" readonly>
                </div>
                <div class="period-chips" id="periodChips"></div>
            </div>

            <!-- Step 2: Photo Upload -->
            <div class="register-step">
                <label class="register-label">식단표 사진</label>
                <div class="register-upload-area" id="uploadArea">
                    <div class="upload-icon">📷</div>
                    <p>사진을 드래그하거나 클릭해서 업로드</p>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>
                <div class="upload-preview" id="uploadPreview" style="display:none;">
                    <img id="previewImg" src="" alt="미리보기">
                    <button class="btn-remove" id="removeImg">✕</button>
                </div>
            </div>

            <!-- AI Loading -->
            <div class="ai-loading" id="aiLoading" style="display:none;">
                <div class="ai-loading-spinner"></div>
                <p id="aiLoadingText">AI가 식단표를 분석하고 있어요...</p>
            </div>

            <!-- Analysis Result -->
            <div class="analysis-area" id="analysisArea" style="display:none;">
                <label class="register-label">분석 결과 확인</label>
                <div class="week-input-grid" id="analysisWeekGrid"></div>
            </div>

            <!-- Action Buttons -->
            <div class="register-actions">
                <button class="btn-secondary" id="manualToggle">✏️ 직접 입력</button>
                <button class="btn-primary" id="btnSubmitMeal">🍽️ 달력에 넣기</button>
            </div>

            <!-- Manual Input (hidden by default) -->
            <div class="manual-input-area" id="manualArea" style="display:none;">
                <div class="week-input-grid" id="weekInputGrid"></div>
            </div>
        </div>
    </div>


    <!-- Meal Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="mealModal">
            <button class="modal-close" id="modalClose">✕</button>
            <div class="modal-header">
                <h3 id="modalDate"></h3>
                <div class="modal-tabs">
                    <button class="tab-btn active" data-tab="breakfast">🌅 조식</button>
                    <button class="tab-btn" data-tab="lunch">☀️ 중식</button>
                    <button class="tab-btn" data-tab="dinner">🌙 석식</button>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-meal-list" id="modalMealList"></div>
                <div class="modal-calorie" id="modalCalorie">
                    <div class="calorie-icon">🔥</div>
                    <div class="calorie-info">
                        <span class="calorie-label">예상 칼로리 (1인분)</span>
                        <span class="calorie-value" id="calorieValue">-</span>
                    </div>
                </div>
                <div class="modal-search">
                    <p class="search-hint">메뉴를 클릭하면 음식 정보를 검색할 수 있어요! 👆</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Food Info Panel -->
    <div class="food-panel-overlay" id="foodPanelOverlay">
        <div class="food-panel" id="foodPanel">
            <button class="panel-close" id="panelClose">✕</button>
            <h3 id="foodName"></h3>
            <div class="food-search-results" id="foodSearchResults">
                <div class="food-loading">🔍 검색 중...</div>
            </div>
            <div class="food-links" id="foodLinks"></div>
        </div>
    </div>


    <!-- 표현 노트 Modal -->
    <div class="modal-overlay" id="englishOverlay">
        <div class="modal english-modal">
            <button class="modal-close" id="englishClose">✕</button>
            <h3 class="register-title">🔖 나의 스크랩북</h3>
            <p class="register-desc">📌으로 스크랩한 호텔 영어 표현이에요</p>
            <div class="english-note-list" id="englishNoteList"></div>
        </div>
    </div>

    <!-- Reset Modal (Popup) -->
    <div class="modal-overlay" id="resetOverlay">
        <div class="modal reset-modal">
            <button class="modal-close" id="resetClose">✕</button>
            <h3 class="register-title">🗑️ 식단 초기화</h3>
            <p class="register-desc">삭제할 방법을 선택해주세요</p>

            <div class="register-step">
                <label class="register-label">기간 선택 삭제</label>
                <div class="period-selector">
                    <input type="date" id="resetStart" class="period-input">
                    <span class="period-arrow">~</span>
                    <input type="date" id="resetEnd" class="period-input">
                </div>
                <button class="btn-primary" id="btnDeleteRange" style="width:100%; margin-top:12px;">선택 기간 삭제</button>
            </div>

            <div class="register-step">
                <label class="register-label">전체 삭제</label>
                <button class="btn-danger" id="btnDeleteAll" style="width:100%;">⚠️ 모든 식단 삭제</button>
            </div>
        </div>
    </div>

    <script src="app.js?v=20260610f"></script>
</body>
</html>
