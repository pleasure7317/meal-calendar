<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Meal Calendar</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Mood Selector -->
    <div class="mood-section">
        <div class="mood-container">
            <h2 class="mood-title">오늘의 기분은 어떠세요?</h2>
            <div class="mood-emojis">
                <button class="mood-btn" data-mood="happy" title="행복해요">😊</button>
                <button class="mood-btn" data-mood="love" title="사랑스러워요">🥰</button>
                <button class="mood-btn" data-mood="excited" title="신나요">🤩</button>
                <button class="mood-btn" data-mood="sleepy" title="졸려요">😴</button>
                <button class="mood-btn" data-mood="tired" title="피곤해요">😮‍💨</button>
                <button class="mood-btn" data-mood="sad" title="슬퍼요">🥺</button>
                <button class="mood-btn" data-mood="angry" title="화나요">😤</button>
                <button class="mood-btn" data-mood="sick" title="아파요">🤒</button>
            </div>
            <p class="mood-message" id="moodMessage"></p>
        </div>
    </div>

    <!-- Today's Menu -->
    <div class="today-section">
        <div class="today-container">
            <div class="today-row">
                <div class="today-label">
                    <span class="today-label-icon">🍽️</span>
                    <h2>오늘의<br>메뉴</h2>
                </div>
                <div class="today-meals" id="todayMeals">
                    <div class="today-meal-card breakfast-card">
                        <div class="meal-time-badge">조식</div>
                        <div class="meal-time-icon">🌅</div>
                        <div class="today-meal-content" id="todayBreakfast">
                            <p class="no-meal">등록된 메뉴가 없어요</p>
                        </div>
                    </div>
                    <div class="today-meal-card lunch-card">
                        <div class="meal-time-badge">중식</div>
                        <div class="meal-time-icon">☀️</div>
                        <div class="today-meal-content" id="todayLunch">
                            <p class="no-meal">등록된 메뉴가 없어요</p>
                        </div>
                    </div>
                    <div class="today-meal-card dinner-card">
                        <div class="meal-time-badge">석식</div>
                        <div class="meal-time-icon">🌙</div>
                        <div class="today-meal-content" id="todayDinner">
                            <p class="no-meal">등록된 메뉴가 없어요</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Calendar Section -->
    <div class="calendar-section">
        <div class="calendar-container">
            <div class="calendar-top-bar">
                <button class="btn-register" id="openRegister">📸 식단 등록</button>
                <div class="calendar-header">
                    <button class="nav-btn" id="prevMonth">◀</button>
                    <h2 class="calendar-month" id="calendarMonth"></h2>
                    <button class="nav-btn" id="nextMonth">▶</button>
                </div>
                <div></div>
            </div>
            <div class="calendar-weekdays">
                <div class="weekday sun">일</div>
                <div class="weekday">월</div>
                <div class="weekday">화</div>
                <div class="weekday">수</div>
                <div class="weekday">목</div>
                <div class="weekday">금</div>
                <div class="weekday sat">토</div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <!-- Register Modal (Popup) -->
    <div class="modal-overlay" id="registerOverlay">
        <div class="modal register-modal">
            <button class="modal-close" id="registerClose">✕</button>
            <h3 class="register-title">📸 식단표 등록</h3>
            <p class="register-desc">기간을 선택하고 식단표 사진을 올려주세요</p>

            <!-- Step 1: Period Selection -->
            <div class="register-step">
                <label class="register-label">기간을 선택하세요</label>
                <div class="period-selector">
                    <input type="date" id="periodStart" class="period-input">
                    <span class="period-arrow">~</span>
                    <input type="date" id="periodEnd" class="period-input" readonly>
                </div>
                <div class="period-chips" id="periodChips"></div>
            </div>

            <!-- Step 2: Photo Upload -->
            <div class="register-step">
                <label class="register-label">식단표 사진</label>
                <div class="register-upload-area" id="uploadArea">
                    <div class="upload-icon">📷</div>
                    <p>사진을 드래그하거나 클릭해서 업로드</p>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>
                <div class="upload-preview" id="uploadPreview" style="display:none;">
                    <img id="previewImg" src="" alt="미리보기">
                    <button class="btn-remove" id="removeImg">✕</button>
                </div>
            </div>

            <!-- AI Loading -->
            <div class="ai-loading" id="aiLoading" style="display:none;">
                <div class="ai-loading-spinner"></div>
                <p>AI가 식단표를 분석하고 있어요...</p>
            </div>

            <!-- Analysis Result -->
            <div class="analysis-area" id="analysisArea" style="display:none;">
                <label class="register-label">분석 결과 확인</label>
                <div class="week-input-grid" id="analysisWeekGrid"></div>
            </div>

            <!-- Action Buttons -->
            <div class="register-actions">
                <button class="btn-secondary" id="manualToggle">✏️ 직접 입력</button>
                <button class="btn-primary" id="btnSubmitMeal">🍽️ 달력에 넣기</button>
            </div>

            <!-- Manual Input (hidden by default) -->
            <div class="manual-input-area" id="manualArea" style="display:none;">
                <div class="week-input-grid" id="weekInputGrid"></div>
            </div>
        </div>
    </div>


    <!-- Meal Detail Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="mealModal">
            <button class="modal-close" id="modalClose">✕</button>
            <div class="modal-header">
                <h3 id="modalDate"></h3>
                <div class="modal-tabs">
                    <button class="tab-btn active" data-tab="breakfast">🌅 조식</button>
                    <button class="tab-btn" data-tab="lunch">☀️ 중식</button>
                    <button class="tab-btn" data-tab="dinner">🌙 석식</button>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-meal-list" id="modalMealList"></div>
                <div class="modal-calorie" id="modalCalorie">
                    <div class="calorie-icon">🔥</div>
                    <div class="calorie-info">
                        <span class="calorie-label">예상 칼로리 (1인분)</span>
                        <span class="calorie-value" id="calorieValue">-</span>
                    </div>
                </div>
                <div class="modal-search">
                    <p class="search-hint">메뉴를 클릭하면 음식 정보를 검색할 수 있어요! 👆</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Food Info Panel -->
    <div class="food-panel-overlay" id="foodPanelOverlay">
        <div class="food-panel" id="foodPanel">
            <button class="panel-close" id="panelClose">✕</button>
            <h3 id="foodName"></h3>
            <div class="food-search-results" id="foodSearchResults">
                <div class="food-loading">🔍 검색 중...</div>
            </div>
            <div class="food-links" id="foodLinks"></div>
        </div>
    </div>


    <script src="app.js?v=20260608b"></script>
</body>
</html>
